services:
    app:
        build: ./
        working_dir: /app/
        volumes:
            - ./backend/:/app/backend/
            - ./frontend/:/app/frontend/
            - explorer_data:/app/backend/data/
        ports:
            - "1401:1401"
            - "1400:1400"
        env_file:
            - ./backend/.env_dev
        entrypoint: []
        command: sh -c "concurrently --names \"backend,frontend\" --prefix \"{name}:\" --prefix-colors \"#f2caff,#61f2f2\" \"cd ./backend/ && npm run dev\" \"wait-for-it app:1401 -t 0 && cd ./frontend/ && npm run dev\""
        restart: "no"
volumes:
    explorer_data:
